{% load static %}

<html>
<head>
<meta charset="UTF-8">
<title>30 Photo Collage</title>

<!-- BOOTSTRAP 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ================= COMMON ================= */
.collage{
  display:grid;
  gap:10px;
}
.collage img{
  width:100%;
  height:180px;
  object-fit:cover;
}

/* ================= 1–6 GRID ================= */
.grid{ grid-template-columns:repeat(6,1fr); }
.grid5{ grid-template-columns:repeat(5,1fr); }
.grid4{ grid-template-columns:repeat(4,1fr); }

/* ================= 7 HERO ================= */
.hero{ grid-template-columns:repeat(6,1fr); }
.hero .item:first-child{
  grid-column:span 3;
  grid-row:span 2;
}
.hero img{ height:220px; }

/* ================= 8 POLAROID ================= */
.polaroid .item{
  background:#fff;
  padding:10px;
  box-shadow:0 6px 15px rgba(0,0,0,.25);
}
.polaroid img{ height:150px; }

/* ================= 9 MASONRY ================= */
.masonry{
  column-count:4;
}
.masonry .item{
  break-inside:avoid;
  margin-bottom:10px;
}
.masonry img{ height:auto; }

/* ================= 10 CIRCLE ================= */
.circle img{ border-radius:50%; }

/* ================= 11 ROUNDED ================= */
.rounded img{ border-radius:20px; }

/* ================= 12 BORDER ================= */
.border img{ border:4px solid #fff; }

/* ================= 13 OVERLAP ================= */
.overlap{
  display:flex;
  flex-wrap:wrap;
}
.overlap .item{
  margin-left:-40px;
}

/* ================= 14 STRIP ================= */
.strip{ grid-template-columns:repeat(3,1fr); }
.strip img{ height:320px; }

/* ================= 15 STORY ================= */
.story{ grid-template-columns:repeat(3,1fr); }
.story img{ height:400px; }

/* ================= 16 SHADOW ================= */
.shadow img{ box-shadow:0 10px 20px rgba(0,0,0,.4); }

/* ================= 17 VINTAGE ================= */
.vintage img{ filter:sepia(60%); }

/* ================= 18 DARK ================= */
.dark img{ filter:brightness(70%); }

/* ================= 19 ZOOM ================= */
.zoom img{ transition:.3s; }
.zoom img:hover{ transform:scale(1.15); }

/* ================= 20 STACK ================= */
.stack .item{ transform:rotate(-2deg); }
.stack .item:nth-child(even){ transform:rotate(2deg); }

/* ================= 21 ABSTRACT ================= */
.abstract img{ border-radius:40% 10% 30% 10%; }

/* ================= 22 MOOD ================= */
.mood img{ filter:grayscale(30%); }

/* ================= 23 YEAR ================= */
.year img{ filter:sepia(20%); }

/* ================= 24 SQUARE ================= */
.square img{ border-radius:0; }

/* ================= 25 SOFT ================= */
.soft img{ border-radius:12px; }

/* ================= 26 MINIMAL ================= */
.minimal img{ border-radius:8px; }

/* ================= 27 CLASSIC ================= */
.classic img{ border-radius:4px; }

/* ================= 28 CLEAN ================= */
.clean img{ border:1px solid #ddd; }

/* ================= 29 PHOTO PILE ================= */
.pile{
  display:flex;
  flex-wrap:wrap;
}
.pile .item{
  transform:rotate(-3deg);
  margin:5px;
}

/* ================= 30 MOSAIC ================= */
.mosaic img{ filter:contrast(110%); }
</style>
</head>

<body>

<div class="container my-4">
  <h3 class="text-center mb-3">
    {{ style|upper }} COLLAGE
  </h3>

  <!-- 🔥 SINGLE MASTER WRAPPER -->
  <div class="collage {{ style }}">
    {% for photo in photos %}
      <div class="item">
        <img src="{% static 'images/'|add:photo %}">
      </div>
    {% endfor %}
  </div>
</div>

</body>
</html>
