<html>
<head>
  <title>{{ album.title }} | Flipix</title>
     {% load bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
  <style>
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial;
    }

    h2 {
      color: white;
      margin-bottom: 15px;
    }

    .book {
      position: relative;
      width: 600px;
      height: 420px;
      perspective: 3000px;
    }

    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      transform-origin: left;
      transform-style: preserve-3d;
      transition: transform 1s ease, opacity 1s ease, filter 1s ease;
      backface-visibility: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .page.flipped {
      transform: rotateY(-180deg);
      opacity: 0.95;
    }



    /* TRANSITIONS POOL */
    .fade { opacity: 50; transition: opacity 4s; }
    .zoom-in { transform: scale(0.8); transition: transform 4s; }
    .zoom-out { transform: scale(1.2); transition: transform 4s; }
    .rotate-left { transform: rotate(-100deg); transition: transform 4s; }
    .rotate-right { transform: rotate(100deg); transition: transform 4s; }
    .pan-left { transform: translateX(-50px); transition: transform 4s; }
    .pan-right { transform: translateX(50px); transition: transform 4s; }
    .pan-up { transform: translateY(-50px); transition: transform 4s; }
    .pan-down { transform: translateY(50px); transition: transform 4s; }
    .blur { filter: blur(5px); transition: filter 4s; }
    .grayscale { filter: grayscale(100%); transition: filter 4s; }
    .brightness { filter: brightness(1.5); transition: filter 4s; }
    .darken { filter: brightness(0.6); transition: filter 4s; }
    .flip-x { transform: rotateX(100deg); transition: transform 4s; }
    .flip-y { transform: rotateY(100deg); transition: transform 4s; }
    .skew { transform: skew(10deg,5deg); transition: transform 4s; }

    .controls { margin-top: 15px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }

        /* 🎵 MUSIC */
    audio{margin-bottom:20px}



    /* Vertical Shutter Reveal */
.shutter-in {
  clip-path: inset(0% 50% 0% 50%); /* बीच से बंद */
  transition: clip-path 4s ease;
}
.shutter-in.active {
  clip-path: inset(0% 0% 0% 0%); /* पूरा खुल गया */
}
    .perspective-tilt {
  transform: perspective(1000px) rotateX(30deg) translateY(50px);
  opacity: 0;
  transition: all 4s cubic-bezier(0.2, 1, 0.3, 1);
}
.perspective-tilt.active {
  transform: perspective(1000px) rotateX(50deg) translateY(0);
  opacity: 1;
}
    .diamond-reveal {
  clip-path: polygon(50% 50%, 50% 50%, 50% 50%, 50% 50%);
  transition: clip-path 4s ease-in-out;
}
.diamond-reveal.active {
  clip-path: polygon(50% -20%, 120% 50%, 50% 120%, -20% 50%);
}

    .ghost-fade {
  filter: blur(20px);
  transform: scale(1.5);
  opacity: 0;
}
.ghost-fade.active {
  filter: blur(0);
  transform: scale(1);
  opacity: 1;
}
.elastic-slide {
  transform: translateX(100%);
  /* Custom Bezier for Elastic effect */
  transition: transform 4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}
.elastic-slide.active {
  transform: translateX(0);
}



  </style>
</head>

<body>
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="{% static 'vecteezy_beautiful-waterfall-in-the-tropical-jungle_27975424.mp4' %}" type="video/mp4">
</video>
<h2>{{ album.title }}</h2>

<div class="book" id="book">

</div>

<!-- 🎵 MUSIC -->
{% if music_url %}
<audio controls autoplay loop style="padding-top:20px;">
  <source src="{{ music_url }}" type="audio/mpeg">
</audio>
{% endif %}

<script>
const pages = document.querySelectorAll(".page");
let current = 0;
let transitionIndex = 0;
let autoPlay = true;
const INTERVAL_TIME = 4000; // 4 sec per page

const transitions = [
  "zoom-in","zoom-out",
  "pan-left","pan-right",
  "flip-x","flip-y",
  "pan-up","pan-down",
  "ghost-fade"
];

function applySequentialTransition(page){
  const t = transitions[transitionIndex];
  page.classList.add(t);

  setTimeout(() => {
    page.classList.remove(t);
  }, 1500);

  transitionIndex = (transitionIndex + 1) % transitions.length;
}

/* ▶ NEXT PAGE (FORWARD FLIP) */
function nextPage(manual = true) {
  if(manual) stopAuto();

  if (current < pages.length) {
    pages[current].classList.add("flipped");
    applySequentialTransition(pages[current]);
    current++;
  } else {
    resetBook();
  }
}

/* ◀ PREVIOUS PAGE (REVERSE FLIP STYLE) */
function prevPage(manual = true) {
  if(manual) stopAuto();

  if (current > 0) {
    current--;
    pages[current].classList.add("reverse");
    pages[current].classList.remove("flipped");
    applySequentialTransition(pages[current]);

    setTimeout(()=>{
      pages[current].classList.remove("reverse");
    },1000);
  }
}

/* 🔄 AUTO SLIDE */
function autoSlide(){
  if(autoPlay){
    nextPage(false);
  }
}

let slideTimer = setInterval(autoSlide, INTERVAL_TIME);

function stopAuto(){
  autoPlay = false;
  clearInterval(slideTimer);
}

 /*🔁 RESET BOOK
function resetBook(){
  current = 0;
  pages.forEach(p=>{
    p.classList.remove("flipped","reverse");
  });
}*/
</script>


</body>
